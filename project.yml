name: "Shopping List"

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.46.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

options:
  bundleIdPrefix: com.patbarlow
  deploymentTarget:
    iOS: "26.0"
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: T544U3WVL6

targets:
  "Shopping List":
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Shared
      - path: iOS
        excludes:
          - IntentsExtension/**
    resources:
      - path: iOS/Assets.xcassets
      - path: Shared/Config.plist
    dependencies:
      - package: Sentry
        product: Sentry
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: Trolley
        UILaunchScreen:
          UIColorName: systemBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Used for voice input when adding items to your shopping list."
        NSSpeechRecognitionUsageDescription: "Used to convert your voice into shopping list items."
        NSSiriUsageDescription: "Used to add items to your shopping list hands-free."
        CFBundleURLTypes:
          - CFBundleURLName: com.patbarlow.shoppinglist
            CFBundleURLSchemes:
              - shoppinglist
        NSUserActivityTypes:
          - com.patbarlow.shoppinglist.quickAdd
        # Registers the app as a PDF handler so it appears in the share sheet (#10).
        CFBundleDocumentTypes:
          - CFBundleTypeName: PDF Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
        # Export-compliance declaration so App Store builds don't prompt (#11).
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.patbarlow.shoppinglist
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    postBuildScripts:
      - name: "Upload Debug Symbols to Sentry"
        script: |
          if which sentry-cli >/dev/null; then
            export SENTRY_ORG=speaking-computer
            export SENTRY_PROJECT=shopping-list
            ERROR=$(sentry-cli debug-files upload --include-sources "$DWARF_DSYM_FOLDER_PATH" 2>&1 >/dev/null)
            if [ ! $? -eq 0 ]; then
              echo "warning: sentry-cli - $ERROR"
            fi
          else
            echo "warning: sentry-cli not installed, download from https://github.com/getsentry/sentry-cli/releases"
          fi
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}"
    entitlements:
      path: iOS/Shopping List.entitlements
      properties:
        com.apple.developer.siri: true
        com.apple.security.application-groups:
          - group.com.patbarlow.shoppinglist

  "Shopping List macOS":
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Shared
      - path: macOS
    dependencies:
      - package: Sentry
        product: Sentry
      - package: Sparkle
        product: Sparkle
    resources:
      - path: macOS/Assets.xcassets
      - path: Shared/Config.plist
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: Shopping List
        NSHumanReadableCopyright: "© 2024 Pat Barlow"
        SUFeedURL: "https://raw.githubusercontent.com/patbarlow/shopping-list/main/appcast.xml"
        SUPublicEDKey: "DXaM+fPfK1BV4Q2ZFL72kY2QAEkgduZvo+77jYb5Dnk="
        SUEnableInstallerLauncherService: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.patbarlow.shoppinglist.mac
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "2"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: "macOS/Shopping List macOS.entitlements"
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

schemes:
  "Shopping List":
    build:
      targets:
        "Shopping List": all
    run:
      config: Debug
    archive:
      config: Release

  "Shopping List macOS":
    build:
      targets:
        "Shopping List macOS": all
    run:
      config: Debug
    archive:
      config: Release
